# Build CourseLib desktop bundles and publish a GitHub Release.
# Deploy log: Actions tab → this workflow run.
# Trigger: push a version tag (v0.1.0) or run manually via workflow_dispatch.
#
# macOS: both arch jobs use macos-14 (Apple Silicon). arm64 builds natively;
# x64 cross-compiles. Windows: native MSVC x64 NSIS installer (unsigned).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            platform: macos-14
            rust_target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - name: macOS x64
            platform: macos-14
            rust_target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - name: Windows x64
            platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc --bundles nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.version }}"
          if BODY=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            -f target_commitish="${{ github.sha }}" \
            --jq .body 2>/dev/null); then
            {
              echo "body<<EOF"
              echo "## CourseLib $TAG"
              echo
              echo "Desktop builds for macOS (arm64/x64) and Windows (x64 NSIS) are attached below."
              echo "Windows installers are currently unsigned; SmartScreen may show an Unknown Publisher warning."
              echo "Open the **Actions → Release** run for this tag for the full deploy log."
              echo
              echo "$BODY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<EOF"
              echo "## CourseLib $TAG"
              echo
              echo "Desktop builds for macOS (arm64/x64) and Windows (x64 NSIS) are attached below."
              echo "Windows installers are currently unsigned; SmartScreen may show an Unknown Publisher warning."
              echo
              echo "Deploy log: GitHub **Actions** → workflow **Release** for this tag."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: CourseLib v__VERSION__
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
