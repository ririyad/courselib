site_name: CourseLib
site_description: Local-first, offline-capable personal knowledge library for desktop
site_url: https://ririyad.github.io/courselib/
repo_url: https://github.com/ririyad/courselib
repo_name: ririyad/courselib
edit_uri: edit/main/docs/
copyright: Copyright &copy; CourseLib contributors &mdash; MIT License

theme:
  name: material
  language: en
  logo: assets/app-icon.svg
  favicon: assets/app-icon.svg
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Vault & how it works: vault.md
  - Releases: releases.md

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ririyad/courselib
      name: GitHub
